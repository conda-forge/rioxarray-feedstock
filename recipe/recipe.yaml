schema_version: 1

context:
  python_min: 3.12
  version: 0.22.0

package:
  name: rioxarray
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/rioxarray/rioxarray-${{ version }}.tar.gz
  sha256: 3f55f23a632ffd9eff13463634227f4afbbcf298947536e161f6cf2ce88d4373

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - packaging
    - rasterio >=1.4.3
    - xarray >=2026.2
    - pyproj >=3.3
    - numpy >=2
tests:
  - python:
      imports:
        - rioxarray
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - '*'

about:
  homepage: http://github.com/corteva/rioxarray
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: rasterio xarray extension.
  description: rasterio xarray extension.
  documentation: https://corteva.github.io/rioxarray
  repository: http://github.com/corteva/rioxarray

extra:
  recipe-maintainers:
    - snowman2
